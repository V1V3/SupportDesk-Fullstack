services:
  db:
    image: postgres:16
    container_name: supportdesk_db
    environment:
      POSTGRES_DB: supportdesk
      POSTGRES_USER: supportdesk
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - supportdesk_db_data:/var/lib/postgresql/data

volumes:
  supportdesk_db_data: